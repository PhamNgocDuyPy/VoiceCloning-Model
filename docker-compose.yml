version: '3.8'

services:
  voicelab-web:
    build: .
    container_name: voicelab-web
    ports:
      - "8000:8000"
    volumes:
      - ./web_app/static/outputs:/app/web_app/static/outputs
      - ./web_app/static/chat_history.json:/app/web_app/static/chat_history.json
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
